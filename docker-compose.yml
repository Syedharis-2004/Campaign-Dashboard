version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campaign-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: campaign_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campaign-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:password@db:5432/campaign_db
      - JWT_SECRET=supersecretjwt
      - PORT=5000
    depends_on:
      - db

  ai-microservice:
    build:
      context: ./ai-microservice
      dockerfile: Dockerfile
    container_name: campaign-ai-microservice
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campaign-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_AI_API_URL=http://localhost:5001

volumes:
  pgdata:
