services:
  # Backend API Configuration
  - type: web
    name: campaign-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campaign-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  # AI Microservice Configuration
  - type: web
    name: campaign-ai-microservice
    env: node
    rootDir: ai-microservice
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: OPENAI_API_KEY
        sync: false # Requires manual entry in the Render Dashboard

databases:
  # Auto-provisioned PostgreSQL Instance
  - name: campaign-db
    databaseName: campaign_db
    user: admin
